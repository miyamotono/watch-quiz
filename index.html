<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ウォッチ・アカデミー — 腕時計の教養クイズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --dial:#101725;--dial-2:#17202F;--card:#1B2536;--line:#2B3648;
    --gold:#C8A96E;--gold-soft:#A98F5E;--silver:#E9E7E1;--muted:#8B95A5;
    --correct:#7FB08A;--wrong:#C07A7A;
    --serif:'Shippori Mincho', serif;--sans:'Zen Kaku Gothic New', sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(1200px 700px at 50% -10%, #1B2740 0%, var(--dial) 55%);
    color:var(--silver);font-family:var(--sans);line-height:1.7;
    display:flex;justify-content:center;padding:32px 16px 64px;
  }
  .app{width:100%;max-width:680px}
  .brand{text-align:center;margin-bottom:28px}
  .brand .eyebrow{font-size:11px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
  .brand h1{font-family:var(--serif);font-weight:600;font-size:clamp(26px,5vw,36px);letter-spacing:.08em}
  .brand .sub{color:var(--muted);font-size:13px;margin-top:8px;letter-spacing:.08em}
  .rule{width:120px;height:1px;margin:18px auto 0;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .screen{display:none;animation:fade .45s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .lead{color:var(--muted);font-size:14px;text-align:center;margin-bottom:26px}
  .backlink{display:inline-block;color:var(--muted);font-size:12px;letter-spacing:.1em;margin-bottom:18px;cursor:pointer;background:none;border:none;font-family:var(--sans)}
  .backlink:hover{color:var(--gold)}
  .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.cat-grid{grid-template-columns:1fr}}
  .cat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px 18px;cursor:pointer;text-align:left;color:var(--silver);font-family:var(--sans);transition:border-color .2s, transform .15s}
  .cat:hover{border-color:var(--gold-soft);transform:translateY(-2px)}
  .cat:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .cat .cname{font-family:var(--serif);font-size:17px;letter-spacing:.06em;color:var(--gold)}
  .cat .cdesc{font-size:12.5px;color:var(--muted);margin-top:6px}
  .cat .ccount{font-size:11px;color:var(--muted);margin-top:10px;letter-spacing:.15em}
  .cat.mix{grid-column:1/-1;text-align:center;background:linear-gradient(180deg,#20304A,#1B2536)}
  .cat.mix .cname{font-size:18px}
  .diff-grid{display:grid;gap:12px}
  .diff{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 20px;cursor:pointer;text-align:left;color:var(--silver);font-family:var(--sans);display:flex;align-items:center;gap:16px;transition:border-color .2s, transform .15s}
  .diff:hover{border-color:var(--gold-soft);transform:translateY(-2px)}
  .diff:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .diff .dcrown{font-family:var(--serif);font-size:22px;color:var(--gold);width:34px;flex-shrink:0;text-align:center}
  .diff .dname{font-family:var(--serif);font-size:16px;letter-spacing:.06em}
  .diff .ddesc{font-size:12.5px;color:var(--muted);margin-top:3px}
  .diff .dcount{font-size:11px;color:var(--muted);margin-left:auto;letter-spacing:.1em;white-space:nowrap}
  .hud{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:16px}
  .hud .label{font-size:11px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase}
  .hud .val{font-family:var(--serif);font-size:18px;color:var(--gold)}
  .reserve{flex:1;height:6px;border-radius:3px;background:var(--card);border:1px solid var(--line);overflow:hidden;position:relative}
  .reserve .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-soft),var(--gold));transition:width .5s ease}
  .qcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:28px 26px}
  .qcat{font-size:11px;letter-spacing:.3em;color:var(--gold);margin-bottom:12px;display:flex;gap:10px;align-items:center}
  .qcat .lvl{color:var(--muted);letter-spacing:.15em}
  .qtext{font-family:var(--serif);font-size:clamp(17px,3.4vw,20px);font-weight:600;letter-spacing:.03em;margin-bottom:22px}
  .opts{display:grid;gap:10px}
  .opt{background:var(--dial-2);border:1px solid var(--line);border-radius:8px;padding:14px 16px;text-align:left;color:var(--silver);font-family:var(--sans);font-size:15px;cursor:pointer;transition:border-color .15s, background .15s;display:flex;align-items:center;gap:12px}
  .opt .key{font-family:var(--serif);color:var(--muted);font-size:13px;width:20px;flex-shrink:0}
  .opt:hover:not(:disabled){border-color:var(--gold-soft)}
  .opt:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .opt:disabled{cursor:default}
  .opt.correct{border-color:var(--correct);background:rgba(127,176,138,.12)}
  .opt.correct .key{color:var(--correct)}
  .opt.wrong{border-color:var(--wrong);background:rgba(192,122,122,.12)}
  .opt.dim{opacity:.45}
  .explain{display:none;margin-top:20px;border-top:1px solid var(--line);padding-top:16px}
  .explain.show{display:block;animation:fade .35s ease}
  .verdict{font-family:var(--serif);font-size:15px;letter-spacing:.1em;margin-bottom:6px}
  .verdict.ok{color:var(--correct)}
  .verdict.ng{color:var(--wrong)}
  .etext{font-size:13.5px;color:var(--muted)}
  .nextrow{margin-top:18px;text-align:right}
  .btn{background:transparent;border:1px solid var(--gold-soft);color:var(--gold);font-family:var(--sans);font-size:14px;letter-spacing:.15em;padding:11px 26px;border-radius:6px;cursor:pointer;transition:background .15s}
  .btn:hover{background:rgba(200,169,110,.1)}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .btn.solid{background:var(--gold);color:#1A1408;border-color:var(--gold);font-weight:700}
  .btn.solid:hover{background:#D6B87C}
  .result{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:36px 26px}
  .gauge{width:190px;height:190px;margin:0 auto 18px;display:block}
  .rtitle{font-family:var(--serif);font-size:24px;color:var(--gold);letter-spacing:.08em;margin-bottom:6px}
  .rsub{color:var(--muted);font-size:13.5px;max-width:420px;margin:0 auto 22px}
  .rstats{display:flex;justify-content:center;gap:36px;margin-bottom:26px;flex-wrap:wrap}
  .rstats .stat .n{font-family:var(--serif);font-size:26px;color:var(--silver)}
  .rstats .stat .l{font-size:11px;letter-spacing:.25em;color:var(--muted)}
  .btnrow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <header class="brand">
    <div class="eyebrow">Horology Academy</div>
    <h1>ウォッチ・アカデミー</h1>
    <div class="sub">腕時計のブランド・機構・査定を学ぶ、大人の教養クイズ</div>
    <div class="rule"></div>
  </header>
  <section class="screen active" id="scr-start">
    <p class="lead">カテゴリーを選んでください。次の画面で難易度も選べます。</p>
    <div class="cat-grid" id="catGrid"></div>
  </section>
  <section class="screen" id="scr-diff">
    <button class="backlink" id="backToCat">← カテゴリー選択に戻る</button>
    <p class="lead" id="diffLead"></p>
    <div class="diff-grid" id="diffGrid"></div>
  </section>
  <section class="screen" id="scr-quiz">
    <div class="hud">
      <div><div class="label">Question</div><div class="val" id="qNum">1 / 9</div></div>
      <div class="reserve" aria-hidden="true"><div class="fill" id="reserveFill"></div></div>
      <div style="text-align:right"><div class="label">Streak</div><div class="val" id="streak">0</div></div>
    </div>
    <div class="qcard">
      <div class="qcat"><span id="qCat"></span><span class="lvl" id="qLvl"></span></div>
      <div class="qtext" id="qText"></div>
      <div class="opts" id="opts"></div>
      <div class="explain" id="explain">
        <div class="verdict" id="verdict"></div>
        <div class="etext" id="eText"></div>
        <div class="nextrow"><button class="btn solid" id="nextBtn">次の問題へ</button></div>
      </div>
    </div>
  </section>
  <section class="screen" id="scr-result">
    <div class="result">
      <svg class="gauge" viewBox="0 0 200 200" id="gaugeSvg" role="img" aria-label="スコアゲージ">
        <circle cx="100" cy="100" r="88" fill="none" stroke="#2B3648" stroke-width="6"/>
        <circle id="gaugeArc" cx="100" cy="100" r="88" fill="none" stroke="#C8A96E" stroke-width="6"
                stroke-linecap="round" stroke-dasharray="553" stroke-dashoffset="553"
                transform="rotate(-90 100 100)" style="transition:stroke-dashoffset 1s ease"/>
        <text id="gaugePct" x="100" y="96" text-anchor="middle" fill="#E9E7E1"
              font-family="Shippori Mincho, serif" font-size="34">0%</text>
        <text x="100" y="122" text-anchor="middle" fill="#8B95A5"
              font-family="Zen Kaku Gothic New, sans-serif" font-size="10" letter-spacing="3">ACCURACY</text>
      </svg>
      <div class="rtitle" id="rankTitle"></div>
      <p class="rsub" id="rankSub"></p>
      <div class="rstats">
        <div class="stat"><div class="n" id="rScore">0</div><div class="l">正解数</div></div>
        <div class="stat"><div class="n" id="rBest">0</div><div class="l">最大連続正解</div></div>
      </div>
      <div class="btnrow">
        <button class="btn solid" id="retryBtn">同じ条件でもう一度</button>
        <button class="btn" id="homeBtn">カテゴリー選択へ</button>
      </div>
    </div>
  </section>
</div>
<script>
// level: 1=初級 2=中級 3=上級
const QUESTIONS = [
// ============ brand ブランドの基礎 (60) ============
{c:"brand",l:1,q:"1905年にロンドンでロレックスを創業した人物は誰でしょう？",
 a:["ハンス・ウィルスドルフ","ルイ・カルティエ","ニコラス・G・ハイエック","フロレンティン・アリオスト・ジョーンズ"],k:0,
 e:"ドイツ出身のハンス・ウィルスドルフがロンドンで創業し、後に本拠をスイスのジュネーブへ移しました。「Rolex」は、どの言語でも発音しやすいように考案された造語だとされています。"},
{c:"brand",l:1,q:"いわゆる「世界三大高級時計（雲上ブランド）」に、一般的に含まれないのはどれでしょう？",
 a:["ロレックス","パテック フィリップ","オーデマ ピゲ","ヴァシュロン・コンスタンタン"],k:0,
 e:"三大ブランドはパテック フィリップ、オーデマ ピゲ、ヴァシュロン・コンスタンタンです。ロレックスは知名度と人気で群を抜きますが、伝統的な格付けではこの3社が「雲上」とされています。"},
{c:"brand",l:1,q:"セイコーが1969年に発売した、世界初の市販クォーツ腕時計の名前は？",
 a:["アストロン","ローレル","キングセイコー","マーベル"],k:0,
 e:"「クオーツ アストロン」は1969年12月に発売されました。従来の機械式より桁違いに高精度で、世界の時計産業の構造を変えた「クォーツショック」の引き金となりました。"},
{c:"brand",l:1,q:"「落としても壊れない時計」を目指してG-SHOCKを開発した、カシオの技術者は誰でしょう？",
 a:["伊部菊雄","服部金太郎","樫尾忠雄","御手洗毅"],k:0,
 e:"伊部菊雄氏が、大切にしていた時計を落として壊した経験から開発を発案しました。約200個の試作を経て、1983年に初代DW-5000Cが誕生したと伝えられています。"},
{c:"brand",l:1,q:"シチズンが展開する、光を動力に変える独自の発電技術の名称は？",
 a:["エコ・ドライブ","スプリングドライブ","キネティック","オートクォーツ"],k:0,
 e:"エコ・ドライブは、文字盤を透過した光で発電し、電池交換を基本的に不要にする技術です。スプリングドライブとキネティックはいずれもセイコーの技術なので、混同しないよう注意しましょう。"},
{c:"brand",l:1,q:"「Since 1832」を掲げ、鉄道時計やスポーツ計時の歴史でも知られるスイスブランドは？",
 a:["ロンジン","オメガ","ゼニス","ラドー"],k:0,
 e:"ロンジンは、翼のついた砂時計のロゴで知られています。鉄道の公式時計やスポーツの計時を数多く手がけてきました。手頃な価格帯ながら高い完成度を持つブランドとして人気です。"},
{c:"brand",l:1,q:"1868年創業で、ダイバーズウォッチ「フィフティ ファゾムズ」で知られるスイスブランドは？",
 a:["ブランパン","ロンジン","ゼニス","ティソ"],k:0,
 e:"ブランパンは、1953年発表の「フィフティ ファゾムズ」で近代的ダイバーズウォッチの草分けとなりました。現存する最古のスイス時計ブランドの一つともいわれます。"},
{c:"brand",l:1,q:"1913年に日本初の腕時計「ローレル」を製造した会社はどこでしょう？",
 a:["精工舎（セイコー）","シチズン時計","オリエント時計","高野精密工業"],k:0,
 e:"服部金太郎が創業した精工舎が、国産初の腕時計「ローレル」を製造しました。セイコーはその後、クォーツやスプリングドライブなどの独自技術で世界をリードしていきます。"},
{c:"brand",l:1,q:"ミッキーマウスの腕時計などでも知られる、アメリカの老舗時計ブランドは？",
 a:["インガーソル","ハミルトン","ブローバ","タイメックス"],k:0,
 e:"インガーソルは、20世紀初頭に安価な懐中時計を大量生産し「1ドルウォッチ」で知られました。後年、ミッキーマウスをあしらった時計もヒットさせています。"},
{c:"brand",l:1,q:"スイスの高級ブランド「オメガ」が本拠を置く町はどこでしょう？",
 a:["ビール／ビエンヌ","ジュネーブ","チューリッヒ","バーゼル"],k:0,
 e:"オメガは、スイス西部の時計産業の中心地ビール（フランス語名ビエンヌ）に本拠を置いています。オリンピックの公式計時を長年務めるブランドとしても有名です。"},
{c:"brand",l:2,q:"1755年の創業以来、一度も操業を途絶えさせていない最古の時計マニュファクチュールは？",
 a:["ヴァシュロン・コンスタンタン","パテック フィリップ","ブレゲ","ゼニス"],k:0,
 e:"ヴァシュロン・コンスタンタンは、270年以上にわたり途切れることなく時計を作り続けています。ブランパンは1735年創業とより古いものの、操業に中断期間がありました。"},
{c:"brand",l:2,q:"ドイツ時計の聖地グラスヒュッテを本拠とする、高級ブランドはどれでしょう？",
 a:["A. ランゲ＆ゾーネ","IWC","ジャガー・ルクルト","オーデマ ピゲ"],k:0,
 e:"A. ランゲ＆ゾーネは1845年の創業です。東西ドイツ統一後の1990年に復興し、ドイツ時計の最高峰と評されています。同じグラスヒュッテには、グラスヒュッテ・オリジナルやノモスもあります。"},
{c:"brand",l:2,q:"IWCの本拠地があるスイスの町はどこでしょう？",
 a:["シャフハウゼン","ジュネーブ","ビール／ビエンヌ","ル・ロックル"],k:0,
 e:"IWCは、正式名を「インターナショナル・ウォッチ・カンパニー」といい、スイス東部のシャフハウゼンに本拠を置いています。多くのスイスブランドが西部に集中するなか、珍しい立地です。"},
{c:"brand",l:2,q:"ロイヤル オークやノーチラスを手がけ、「時計界のピカソ」とも称されたデザイナーは？",
 a:["ジェラルド・ジェンタ","ジョージ・ダニエルズ","フランク・ミュラー","アブラアン＝ルイ・ブレゲ"],k:0,
 e:"ジェラルド・ジェンタは、ラグジュアリースポーツウォッチというジャンルを確立した伝説的デザイナーです。ブルガリ「オクト」の源流やIWC「インヂュニア」も彼の仕事です。"},
{c:"brand",l:2,q:"1839年創業で、複雑機構と美術工芸を融合させることで知られるジュネーブのブランドは？",
 a:["パテック フィリップ","ショパール","ピアジェ","ロジェ・デュブイ"],k:0,
 e:"パテック フィリップは、「ジュネーブシール」の伝統を体現するブランドの代表格です。一族経営を貫き、パーペチュアルカレンダーやミニッツリピーターなどの複雑機構を数多く手がけています。"},
{c:"brand",l:2,q:"創業者一族の名を冠し、極薄ムーブメントの開発競争を長年リードしてきたブランドは？",
 a:["ピアジェ","ブルガリ","ハリー・ウィンストン","ショパール"],k:0,
 e:"ピアジェは、1957年に手巻きで厚さ2mm、1976年には自動巻きで2.08mmという極薄ムーブメントを発表するなど、薄型化の技術で高く評価されてきました。"},
{c:"brand",l:2,q:"フランスの宝飾ブランドで、「サントス」「タンク」などの名作時計を生んだのはどこでしょう？",
 a:["カルティエ","ブシュロン","ヴァン クリーフ&アーペル","ショーメ"],k:0,
 e:"カルティエは宝飾で名高い一方、腕時計の歴史でも重要な役割を果たしました。1904年の「サントス」は、男性用腕時計の普及に大きく貢献した先駆的なモデルです。"},
{c:"brand",l:2,q:"1848年創業で、パイロットウォッチやオリンピック公式計時で知られるブランドは？",
 a:["オメガ","IWC","ブライトリング","ゼニス"],k:0,
 e:"オメガは1848年にルイ・ブランがスイスで創業しました。宇宙開発や潜水、オリンピックなど、あらゆる場面で高精度が求められる現場を支えてきたブランドです。"},
{c:"brand",l:2,q:"「ビッグ・バン」で知られ、異素材の組み合わせを打ち出したスイスの新興ブランドは？",
 a:["ウブロ","リシャール・ミル","MB&F","ベル&ロス"],k:0,
 e:"ウブロは1980年創業と比較的新しいものの、金とラバーなど異素材の融合という発想で人気を確立しました。「フュージョン（融合）」を掲げるブランドとして知られています。"},
{c:"brand",l:2,q:"薄型で軽量なチタン素材やハイテクセラミックを早くから採用したブランドは？",
 a:["ラドー","チューダー","オリス","ノモス"],k:0,
 e:"ラドーは、傷が付きにくいハイテクセラミックや硬質素材の腕時計を先駆的に開発してきました。素材技術に強みを持つスイスブランドとして知られています。"},
{c:"brand",l:3,q:"独立時計師として知られ、同軸脱進機を発明してオメガに技術供与したイギリス人は？",
 a:["ジョージ・ダニエルズ","ジェラルド・ジェンタ","フィリップ・デュフォー","フランソワ＝ポール・ジュルヌ"],k:0,
 e:"ジョージ・ダニエルズは、20世紀を代表する独立時計師の一人です。摩擦を減らす「コーアクシャル（同軸）脱進機」を考案し、1999年からオメガがこれを実用化しました。"},
{c:"brand",l:3,q:"「シンプリシティ」で知られ、現代最高峰の一人と称されるスイスの独立時計師は？",

{c:"model",l:3,q:"リシャール・ミル「RM」シリーズが素材面で追求してきたのは？",
 a:["航空宇宙由来の軽量高強度素材","純金の多用","陶器の多用","木材の活用"],k:0,
 e:"リシャール・ミルは、航空宇宙やレースの技術に着想を得た軽量で高強度な素材を積極的に採用し、装着感と耐久性を両立させています。"},
{c:"model",l:3,q:"オーデマ ピゲ「ロイヤル オーク オフショア」がロイヤル オークに加えた方向性は？",
 a:["より大型でスポーティー","より薄型","より宝飾的","デジタル化"],k:0,
 e:"ロイヤル オーク オフショアは、元のロイヤル オークをより大型・堅牢にし、力強いスポーツ性を打ち出した派生モデルとして人気を確立しました。"},
{c:"model",l:3,q:"F.P.ジュルヌ「クロノメーター・スーヴェラン」などに使われた、独自の工夫は？",
 a:["レゾナンス（共振）など独創的機構の探求","液晶表示","宝飾の多用","極端な大型化"],k:0,
 e:"F.P.ジュルヌは、二つのテンプの共振を用いるレゾナンスなど、独創的な機構を探求することで知られ、収集家から高く評価されています。"},
{c:"model",l:3,q:"ランゲ&ゾーネ「ダトグラフ」が高く評価される主な理由は？",
 a:["美しい手巻きクロノグラフと大型日付","極薄設計","宝飾装飾","低価格"],k:0,
 e:"ダトグラフは、伝統的な手巻きクロノグラフに大型日付を組み合わせ、美しい仕上げのムーブメントを持つ、時計愛好家憧れの一本です。"},
{c:"model",l:3,q:"パテック フィリップ「カラトラバ」が象徴するスタイルは？",
 a:["端正なドレスウォッチの理想","スポーツウォッチ","宝飾時計","デジタル時計"],k:0,
 e:"カラトラバは、無駄のない端正なデザインでドレスウォッチの理想形とされ、パテック フィリップの美意識を体現するシリーズです。"},
{c:"model",l:3,q:"ゼニス「デファイ」シリーズが近年打ち出している技術的な挑戦は？",
 a:["超高振動による高精度計測","極薄設計のみ","宝飾のみ","デジタル表示"],k:0,
 e:"デファイは、通常より格段に速く振動する機構などで100分の1秒単位の計測に挑むなど、ゼニスの技術的な先進性を示すシリーズです。"},
{c:"model",l:3,q:"グランドセイコー「スプリングドライブ」搭載モデルの秒針の特徴は？",
 a:["滑らかに流れるように動く","1秒ごとに強く刻む","逆回転する","止まって見える"],k:0,
 e:"スプリングドライブは、機械式の動力を電子的に精密制御する独自機構で、秒針が滑らかに流れるように動くのが最大の特徴です。"},
// ============ tech 機構と専門用語 (60) ============
{c:"tech",l:1,q:"ストップウォッチ機能を備えた時計を指す言葉はどれでしょう？",
 a:["クロノグラフ","クロノメーター","タキメーター","レギュレーター"],k:0,
 e:"クロノグラフはストップウォッチ機能、クロノメーターは精度検定に合格した時計を指します。名前は似ていますが全くの別物で、時計好きが最初に覚える区別です。"},
{c:"tech",l:1,q:"「クロノメーター」の正しい意味はどれでしょう？",
 a:["公認機関の精度検定に合格した高精度時計","ストップウォッチ付きの時計","月齢を表示する時計","1000m防水の時計"],k:0,
 e:"スイスではCOSC（スイス公認クロノメーター検定協会）が検定を実施しています。機械式は日差-4〜+6秒などの基準をクリアしたものだけが、クロノメーターを名乗れます。"},
{c:"tech",l:1,q:"自動巻き時計で、腕の動きを利用してゼンマイを巻き上げる半円形の部品は？",
 a:["ローター（回転錘）","テンプ","香箱","アンクル"],k:0,
 e:"ローターの回転が、ゼンマイを巻き上げます。透明な裏蓋（シースルーバック）から見える、大きな半円形の部品がそれです。"},
{c:"tech",l:1,q:"ゼンマイを最大まで巻いた状態から、時計が止まるまでの持続時間を指す言葉は？",
 a:["パワーリザーブ","トルクフロー","メインスプリング","ゼンマイ効率"],k:0,
 e:"一般的な自動巻きで約40〜70時間、長いものは数日から数週間に及びます。残量を表示する「パワーリザーブインジケーター」を備えるモデルもあります。"},
{c:"tech",l:1,q:"機械式時計で、ゼンマイの力を蓄えておく円筒形の部品はどれでしょう？",
 a:["香箱（こうばこ）","カレンダー窓","ヒゲゼンマイ","リューズ"],k:0,
 e:"香箱の中にゼンマイが渦巻き状に収められており、これがほどける力で歯車列全体を動かします。手巻き・自動巻きを問わず、基本構造は共通です。"},
{c:"tech",l:1,q:"時計のリューズ（竜頭）を引き出して回すと、一般的にできる操作はどれでしょう？",
 a:["時刻合わせや日付合わせ","防水性能の調整","クロノグラフの計測開始","パワーリザーブの確認"],k:0,
 e:"リューズは段階（ポジション）ごとに機能が変わります。最後まで引き出すと針合わせ、一段引くと日付の早送りができる設計が一般的です。ねじ込み式リューズは防水性を高めます。"},
{c:"tech",l:1,q:"時計の風防（ガラス）に使われる素材で、最も傷が付きにくいとされるのは？",
 a:["サファイアクリスタル","アクリル樹脂","ミネラルガラス","プラスチック"],k:0,
 e:"サファイアクリスタルは、ダイヤモンドに次ぐ硬度を持つ人工素材です。傷が付きにくく透明度も高いため、多くの高級時計の風防に採用されています。"},
{c:"tech",l:1,q:"文字盤に夜光塗料を用いる主な目的は、次のうちどれでしょう？",
 a:["暗所での視認性向上","防水性の強化","磁気の防止","精度の向上"],k:0,
 e:"夜光塗料（ルミナス）は、蓄光や発光の性質を利用しています。暗闇でも針や目盛りを読めるようにするためのもので、ダイバーズウォッチやパイロットウォッチで特に重視されます。"},
{c:"tech",l:1,q:"「手巻き時計」を動かし続けるために、日常的に必要な操作はどれでしょう？",
 a:["リューズを回してゼンマイを巻く","定期的に電池を交換する","日光に当てて充電する","強く振り続ける"],k:0,
 e:"手巻き時計は、リューズを手で回してゼンマイを巻き上げることで動きます。自動巻きと異なりローターがないため、1日1回など定期的に巻く必要があります。"},
{c:"tech",l:1,q:"「20気圧防水」といった表記が主に示しているのは、どのような性能でしょう？",
 a:["水圧に耐えられる目安","何メートル潜れるかの保証","水中での動作保証時間","塩水への耐性のみ"],k:0,
 e:"「〇気圧防水」は、静止した状態でその圧力に耐えられるという目安です。実際の潜水を保証するものではなく、本格的なダイビングにはダイバーズウォッチ規格の時計が必要です。"},
{c:"tech",l:2,q:"重力による姿勢差の誤差を相殺するため、脱進機ごと回転させる複雑機構は？",
 a:["トゥールビヨン","ミニッツリピーター","レトログラード","デッドビートセコンド"],k:0,
 e:"トゥールビヨンは、1801年にアブラアン＝ルイ・ブレゲが特許を取得しました。懐中時計時代の発明ですが、現在は高度な技術力の象徴として珍重されています。"},
{c:"tech",l:2,q:"うるう年を含む月末の日付調整を、自動で行うカレンダー機構はどれでしょう？",
 a:["パーペチュアルカレンダー","アニュアルカレンダー","トリプルカレンダー","ビッグデイト"],k:0,
 e:"パーペチュアルカレンダー（永久カレンダー）は、理論上2100年まで修正が不要です。アニュアルカレンダーは、2月末だけ年1回の修正が必要な簡易版です。"},
{c:"tech",l:2,q:"チャイム音で時刻を知らせる、最高難度の一つとされる複雑機構はどれでしょう？",
 a:["ミニッツリピーター","ソヌリ・ア・トック","アラームウォッチ","ワールドタイム"],k:0,
 e:"ミニッツリピーターは、ボタンやレバーの操作で「時・15分・分」を音色の違いで打ち分けます。音作りは職人の耳と経験に頼る部分が大きい機構です。"},
{c:"tech",l:2,q:"セイコー独自の、機械式の動力とクォーツの制御を融合させた駆動機構は？",
 a:["スプリングドライブ","ハイビート","キネティック","ツインクォーツ"],k:0,
 e:"スプリングドライブは、動力がゼンマイ、精度の制御が水晶という独自方式です。秒針が完全に滑らかに流れる運針が、最大の特徴です。"},
{c:"tech",l:2,q:"テンプに取り付けられ、その振動の速さを司る、渦巻き状の極細のバネは？",
 a:["ヒゲゼンマイ","主ゼンマイ","ガンギ車","コハゼ"],k:0,
 e:"ヒゲゼンマイは、髪の毛ほどの細さで、機械式時計の精度を左右する心臓部です。近年は、磁気に強いシリコン製のヒゲゼンマイも普及しています。"},
{c:"tech",l:2,q:"一定のリズムで往復振動し、歯車の回転速度を一定に保つ部品はどれでしょう？",
 a:["テンプ（テンワ）","香箱車","丸穴車","日の裏車"],k:0,
 e:"テンプは、ヒゲゼンマイと一体になって振動し、脱進機と連動して歯車列の回転速度を一定に保ちます。振動数が高いほど、理論上は精度や耐衝撃性が向上します。"},
{c:"tech",l:2,q:"歯車の回転をテンプの往復運動に変換する、機械式時計の要となる機構の総称は？",
 a:["脱進機（エスケープメント）","巻き上げ機構","カレンダー機構","自動巻き機構"],k:0,
 e:"脱進機は、香箱からの力を一定間隔で断続的にテンプへ伝える役割を持ちます。現代の量産時計の多くは「アンクル脱進機」という方式を採用しています。"},
{c:"tech",l:2,q:"機械式時計が磁気を帯びると、起こりやすい不具合はどれでしょう？",
 a:["ヒゲゼンマイが張り付き大きく進む","電池の消耗が早まる","防水パッキンが劣化する","針が逆回転する"],k:0,
 e:"ヒゲゼンマイが磁化すると、渦巻きの間隔が縮まって短絡し、テンプの振動が速くなって時計が大きく進むことがあります。対策として、非磁性のシリコンヒゲゼンマイなどが使われます。"},
{c:"tech",l:2,q:"衝撃からテンプの軸（ホゾ）を保護する、ばね仕掛けの緩衝装置の代表的な商標は？",
 a:["インカブロック","マジックレバー","パラフレックス","ジャイロマックス"],k:0,
 e:"インカブロックは、テンプの軸受けを可動式にして衝撃を逃がす耐震装置です。1930年代の発明で、現在も多くの機械式時計に採用されています。"},
{c:"tech",l:2,q:"クロノグラフの作動方式のうち、精密ですが製造コストが高い伝統的な方式は？",
 a:["コラムホイール式","カム式","モジュール式","デジタル式"],k:0,
 e:"コラムホイール式は、円柱状の部品の切り欠きでレバーを制御する伝統方式で、操作感の良さから高級機に好まれます。カム式は、部品点数が少なく量産に向いています。"},
{c:"tech",l:3,q:"毎時28,800振動（1時間に28,800回）のテンプは、1秒間に何回振動するでしょう？",
 a:["8回（4Hz）","4回（2Hz）","6回（3Hz）","2回（1Hz）"],k:0,
 e:"28,800を3,600秒（1時間）で割ると8回です。往復1回が2振動にあたるため、周波数は8÷2で4Hzとなります。多くの現代の機械式ムーブメントが、この毎時28,800振動を採用しています。"},
{c:"tech",l:3,q:"1970年代にオメガが実用化した、部品の摩擦を減らし注油周期を延ばせる脱進機は？",
 a:["コーアクシャル脱進機","デタント脱進機","シリンダー脱進機","デュプレックス脱進機"],k:0,
 e:"コーアクシャル脱進機は、同軸状に配置した爪車で力を伝える方式で、ジョージ・ダニエルズが発明しました。摩擦の多い従来のアンクル脱進機に比べ、注油周期を延ばせるとされます。"},
{c:"tech",l:3,q:"磁気の影響を受けにくく、近年ヒゲゼンマイなどへの採用が進む素材は？",
 a:["シリコン（ケイ素）","チタン","セラミック","タングステン"],k:0,
 e:"シリコン製の部品は、非磁性で軽量、摩擦係数も低いため注油が不要になる利点があります。ユリス・ナルダンやパテック フィリップなどが、2000年代から先駆けて採用しました。"},
{c:"tech",l:3,q:"分針や日付表示が扇形の目盛りを進み、端で瞬時に戻る表示方式はどれでしょう？",
 a:["レトログラード","ジャンピングアワー","パワーマティック","デッドビート"],k:0,
 e:"レトログラード（跳ね返り式）は、針が円弧状の目盛りの端まで進むと、一瞬で始点に戻る表示方式です。専用のカム機構によって実現されます。"},
{c:"tech",l:3,q:"通常は連続的に動く秒針を、あえて1秒ごとに正確に1目盛り進める機構は？",
 a:["デッドビート秒針","レトログラード秒針","フライングセコンド","トリプルカレンダー"],k:0,
 e:"デッドビート秒針は、クォーツ時計のような1秒刻みの動きを機械式で再現する機構です。古くは、天文観測用の精密時計（レギュレーター）にも使われました。"},
{c:"tech",l:3,q:"セイコーが開発し、両方向のローター回転を効率よく巻き上げに変える自動巻き機構は？",
 a:["マジックレバー","コーアクシャル方式","キネティック方式","トリプルカレンダー方式"],k:0,
 e:"マジックレバーは、1959年にセイコーが開発した自動巻き機構です。シンプルな部品構成で高い巻き上げ効率を実現し、現在も同社の主力ムーブメントに使われています。"},
{c:"tech",l:3,q:"ゼンマイの巻き上げ量にかかわらず、振動周期を一定に保とうとする性質を指す言葉は？",
 a:["等時性（アイソクロニズム）","逆行性","共振性","慣性"],k:0,
 e:"等時性は、振り子や時計の振動周期が一定に保たれる性質のことです。定力装置（コンスタントフォース）やダブル香箱は、この等時性を高めるための工夫です。"},
{c:"tech",l:3,q:"ケースの中に軟鉄製の内側ケースを設けて磁気を遮る、伝統的な耐磁技法は？",
 a:["インナーケース","ダブルバレル","スケルトン加工","二重風防"],k:0,
 e:"軟鉄で内部を覆うインナーケース構造は、磁力線を迂回させてムーブメントを守ります。ロレックス「ミルガウス」やIWC「インヂュニア」などの耐磁時計に使われる、古典的な手法です。"},
{c:"tech",l:3,q:"ムーブメントの装飾で、渦巻き状の細かな模様を施す伝統技法を何と呼ぶでしょう？",
 a:["コート・ド・ジュネーブなどの装飾","メッキ処理","ヘアライン加工","サンドブラスト"],k:0,
 e:"高級時計のムーブメントには、コート・ド・ジュネーブ（ジュネーブ縞）やペルラージュ（真珠模様）など、手仕上げの装飾が施されます。実用性だけでなく、美しさも評価の対象です。"},
{c:"tech",l:3,q:"1969年に発表されたゼニス「エル・プリメロ」の特徴的な高振動数はどれでしょう？",
 a:["毎時36,000振動（5Hz）","毎時28,800振動（4Hz）","毎時21,600振動（3Hz）","毎時18,000振動（2.5Hz）"],k:0,
 e:"エル・プリメロは、毎時36,000振動という高振動によって1/10秒単位の計測を実現しました。高振動化は精度に有利な一方、部品の摩耗が課題となります。"},
{c:"tech",l:1,q:"「自動巻き」時計を動かし続けるために、日常的に有効なのはどれでしょう？",
 a:["日常的に腕につけて動かす","毎日リューズを回す","日光に当てる","磁石に近づける"],k:0,
 e:"自動巻き時計は腕の動きでゼンマイを巻き上げるため、日常的に着けて動かすことで動き続けます。使わないと止まることがあります。"},
{c:"tech",l:1,q:"時計の「ラグ」とは、どの部分を指すでしょう？",
 a:["ケースとベルトをつなぐ突起部分","文字盤の中心","裏蓋の刻印","リューズの飾り"],k:0,
 e:"ラグは、ケースの上下に伸びてベルトやブレスレットを取り付けるための突起部分です。ラグの形状は時計の印象や着け心地を左右します。"},
{c:"tech",l:1,q:"「クロノグラフ」とは、どのような機能を持つ時計でしょう？",
 a:["ストップウォッチ機能","方位計測機能","自動巻き機能","防水機能"],k:0,
 e:"クロノグラフは、経過時間を計るストップウォッチ機能を備えた時計を指します。押しボタンで計測を開始・停止・リセットできます。"},
{c:"tech",l:1,q:"クォーツ時計の秒針の動きとして、一般的なのはどれでしょう？",
 a:["1秒ごとにカチッカチッと進む","常に滑らかに流れる","逆方向に回る","不規則に動く"],k:0,
 e:"一般的なクォーツ時計の秒針は、1秒ごとに1目盛りずつ進むステップ運針です。機械式の細かく連続的な動きとの見分け方にも使われます。"},
{c:"tech",l:1,q:"時計の「風防」とは、どの部分を指すでしょう？",
 a:["文字盤を覆うガラス","裏蓋","ベルト","リューズ"],k:0,
 e:"風防は、文字盤や針を覆う透明なカバー（ガラスや樹脂）のことです。素材によって傷や衝撃への強さが異なります。"},
{c:"tech",l:1,q:"文字盤の針や数字が暗い場所で光るのは、どのような塗料のためでしょう？",
 a:["夜光塗料（蓄光塗料）","反射塗料","蛍光ペン","LED"],k:0,
 e:"多くの時計は夜光（蓄光）塗料を使い、光を蓄えて暗所で発光します。暗い場所でも時刻を読み取りやすくする工夫です。"},
{c:"tech",l:1,q:"機械式時計の動力源は、次のうちどれでしょう？",
 a:["巻き上げたゼンマイ","電池","太陽光","磁力"],k:0,
 e:"機械式時計は、巻き上げたゼンマイがほどける力を動力にしています。電池で動くクォーツ式との最も基本的な違いです。"},
{c:"tech",l:1,q:"クォーツ時計が機械式より一般的に優れているとされる点は？",
 a:["時刻の正確さ","分解のしやすさ","部品の少なさ","巻き上げの楽しさ"],k:0,
 e:"クォーツ時計は水晶（クォーツ）の安定した振動を利用するため、一般に機械式より時刻が正確で、日常的な使いやすさに優れます。"},
{c:"tech",l:1,q:"時計の「ベゼル」とは、どの部分を指すでしょう？",
 a:["文字盤を囲む縁の部分","裏蓋","ベルト","針"],k:0,
 e:"ベゼルは、風防と文字盤を囲む枠の部分です。回転式のものはダイバーズウォッチなどで経過時間の計測に使われます。"},
{c:"tech",l:1,q:"「ムーブメント」とは、時計のどの部分を指すでしょう？",
 a:["時を刻む内部の機械","文字盤","ベルト","ケース"],k:0,
 e:"ムーブメントは、時計内部で時を刻む機械（駆動装置）の総称です。機械式・クォーツなど種類があり、時計の心臓部にあたります。"},
{c:"tech",l:2,q:"機械式時計で、ゼンマイの力を一定のリズムで少しずつ逃がし歯車を進める機構は？",
 a:["脱進機（エスケープメント）","巻き上げ機構","カレンダー機構","日送り機構"],k:0,
 e:"脱進機は、ゼンマイの力を一定間隔で断続的にテンプへ伝える役割を持ち、時計の精度を左右する重要な機構です。"},
{c:"tech",l:2,q:"「パワーリザーブ」とは、時計の何を示す言葉でしょう？",
 a:["ゼンマイを巻いてから止まるまでの持続時間","防水性能","耐磁性能","文字盤の明るさ"],k:0,
 e:"パワーリザーブは、ゼンマイを巻き上げた状態から時計が止まるまでの持続時間を指します。持続時間を文字盤に表示するモデルもあります。"},
{c:"tech",l:2,q:"ムーブメントの「石（ジュエル）」の数が示しているのは、何でしょう？",
 a:["軸受けなどに使う人工ルビーの数","宝飾用ダイヤの数","歯車の数","ネジの数"],k:0,
 e:"「17石」などの表記は、摩耗を防ぐため軸受けなどに使われる人工ルビー（ジュエル）の数を示します。装飾ではなく、摩擦を減らす機能部品です。"},
{c:"tech",l:2,q:"機械式時計の「日差」とは、何を表す言葉でしょう？",
 a:["1日あたりの進み・遅れの量","日付表示のずれ","昼と夜の温度差","使用した日数"],k:0,
 e:"日差は、時計が1日にどれだけ進むか遅れるかを示す精度の指標です。「日差±10秒」のように表され、数字が小さいほど高精度です。"},
{c:"tech",l:2,q:"「ハック機能（秒針停止機能）」とは、どのような機能でしょう？",
 a:["リューズを引くと秒針が止まり時刻合わせしやすい","秒針が速く動く","秒針が逆回転する","秒針が光る"],k:0,
 e:"ハック機能は、リューズを引くと秒針が止まる仕組みで、正確に時刻を合わせるのに役立ちます。多くの現代の機械式時計に備わっています。"},
{c:"tech",l:2,q:"リューズが「ねじ込み式」になっている主な目的は、何でしょう？",
 a:["防水性を高めるため","巻き上げを速くするため","デザインのため","音を消すため"],k:0,
 e:"ねじ込み式リューズは、リューズをねじで締め込んで密閉することで防水性を高める構造です。ダイバーズウォッチなどで広く採用されています。"},
{c:"tech",l:2,q:"「両ヒゲ」ならぬ、いわゆる「両方向巻き上げ」ローターの利点は？",
 a:["わずかな腕の動きでも効率よく巻ける","精度が上がる","防水性が上がる","薄くなる"],k:0,
 e:"両方向巻き上げのローターは、ローターがどちらに回っても巻き上げに使えるため、少ない動きでも効率よくゼンマイを巻けます。"},
{c:"tech",l:2,q:"ムーブメントの装飾で、直線的な筋模様を規則的に施す仕上げを何と呼ぶ？",
 a:["コート・ド・ジュネーブ（ジュネーブ縞）","ペルラージュ","面取り","サンバースト"],k:0,
 e:"コート・ド・ジュネーブは、平行する筋模様をムーブメントに施す伝統的な装飾で、高級ムーブメントの美しさを引き立てます。"},
{c:"tech",l:2,q:"「complication（コンプリケーション）」とは、時計で何を指す言葉でしょう？",
 a:["時刻表示以外の付加機能","故障","装飾","防水加工"],k:0,
 e:"コンプリケーションは、時分秒の基本表示以外の付加機能（カレンダー、クロノグラフ、ムーンフェイズなど）を指す言葉です。"},
{c:"tech",l:2,q:"「ムーンフェイズ」表示が示すのは、次のうちどれでしょう？",
 a:["月の満ち欠け","潮の満ち引き","日の出時刻","気温"],k:0,
 e:"ムーンフェイズは、月の満ち欠けを文字盤上で表示する機構で、実用性というより情緒的な魅力を持つ人気のコンプリケーションです。"},
{c:"tech",l:3,q:"「ジャンピングアワー」表示とは、どのような時刻表示方式でしょう？",
 a:["時が窓に数字で瞬時に切り替わる","秒針が跳ねる","分針が逆回転する","針が二本になる"],k:0,
 e:"ジャンピングアワーは、通常の時針の代わりに、窓に表示された時の数字が定刻で瞬時に切り替わる表示方式です。独創的な意匠として用いられます。"},
{c:"tech",l:3,q:"「ミニッツリピーター」が音で知らせるのは、次のうちどれでしょう？",
 a:["現在の時刻","アラーム","経過時間","方位"],k:0,
 e:"ミニッツリピーターは、ボタン操作で現在時刻を鐘の音の組み合わせで知らせる高難度の機構です。時・15分単位・分を異なる音で奏でます。"},
{c:"tech",l:3,q:"「コーアクシャル脱進機」の主な利点として最も近いのは？",
 a:["摩擦を減らして注油周期を延ばせる","時計を薄くできる","防水性を高める","音を出せる"],k:0,
 e:"コーアクシャル脱進機は、部品同士の摩擦を減らすことで潤滑油への依存を抑え、メンテナンス間隔を延ばせる利点があるとされます。"},
{c:"tech",l:3,q:"「トゥールビヨン」が本来の効果を最も発揮するのは、どのような時計でしょう？",
 a:["姿勢差の出やすい懐中時計","デジタル時計","クォーツ時計","電波時計"],k:0,
 e:"トゥールビヨンは、重力による姿勢差を平均化する機構で、姿勢がほぼ一定になる懐中時計時代に特に効果を発揮するとされました。腕時計では象徴的意味合いも強いです。"},
{c:"tech",l:3,q:"「シリコン製ヒゲゼンマイ」が注目される理由として最も近いのは？",
 a:["磁気の影響を受けにくい","金属より安い","音が出る","光る"],k:0,
 e:"シリコン製ヒゲゼンマイは、磁気の影響を受けにくく、温度変化にも強いなどの利点があり、近年多くのブランドが採用を進めています。"},
{c:"tech",l:3,q:"「レゾナンス（共振）」を利用した時計が狙う効果は？",
 a:["二つのテンプが同調し精度が安定","音を大きくする","薄くする","防水を高める"],k:0,
 e:"レゾナンスは、二つのテンプの振動が互いに同調する現象を利用して精度の安定を狙う、非常に高度で希少な機構です。"},
{c:"tech",l:3,q:"「フライバック・クロノグラフ」の特徴的な操作は？",
 a:["一度の操作で即リセットして再計測できる","二つの時刻を表示する","逆回転する","音で知らせる"],k:0,
 e:"フライバック機能は、計測中に一度のボタン操作で瞬時にゼロへ戻し、続けて計測を始められる機能で、飛行計時などで重宝されました。"},
{c:"tech",l:3,q:"「トゥールビヨン」を複数軸で回転させる、さらに複雑な発展形の総称は？",
 a:["マルチアクシス・トゥールビヨン","レギュレーター","スプリットセコンド","ジャンピングアワー"],k:0,
 e:"マルチアクシス（多軸）トゥールビヨンは、複数の軸でキャリッジを回転させることで姿勢差をさらに平均化しようとする、極めて複雑な発展形です。"},
{c:"tech",l:3,q:"「デッドビートセコンド（正秒運針）」とは、どのような運針でしょう？",
 a:["1秒ごとにきっちり止まって進む","滑らかに流れる","逆回転する","跳ねる"],k:0,
 e:"デッドビートセコンドは、機械式でありながら秒針が1秒ごとにきっちり止まって進む運針方式で、クォーツのような動きを機械式で再現する凝った機構です。"},
{c:"tech",l:3,q:"「パーペチュアルカレンダー（永久カレンダー）」が優れている点は？",
 a:["うるう年を含め月末調整が原則不要","防水性が高い","薄い","音が出る"],k:0,
 e:"パーペチュアルカレンダーは、月ごとの日数やうるう年まで考慮して日付が進むため、原則として手動の日付調整が長期間不要な高度な機構です。"},
// ============ hist 歴史とトリビア (60) ============
{c:"hist",l:1,q:"1970年代、安価で高精度なクォーツの台頭がスイス機械式時計産業を襲った出来事は？",
 a:["クォーツショック","オイルショック","ウォッチバブル","ジュネーブ危機"],k:0,
 e:"クォーツショック（クォーツ危機）で、スイスの時計関連の雇用は激減しました。1983年のスウォッチの成功と、機械式の高級路線への転換によって産業は復活しました。"},
{c:"hist",l:1,q:"腕時計が男性にも本格的に普及する、大きなきっかけとなった出来事は？",
 a:["第一次世界大戦","産業革命","万国博覧会","大陸横断鉄道の開通"],k:0,
 e:"塹壕戦では懐中時計を取り出す余裕がなく、腕に着ける時計の実用性が証明されました。それまで、腕時計は主に女性の装身具と見なされていました。"},
{c:"hist",l:1,q:"1926年に発表された、世界初の防水腕時計として知られるロレックスのケースの名は？",
 a:["オイスター","パーペチュアル","サイクロップス","トリプロック"],k:0,
 e:"「牡蠣のように密閉された」という意味のオイスターです。翌年、英仏海峡を泳いで渡った女性スイマーが着用し、その防水性が広く知られるようになりました。"},
{c:"hist",l:1,q:"それまで貴重品だった時計を、安く大量に生産する道を切り開いた技術は？",
 a:["部品の互換性を持たせた量産","手作業の徹底","金無垢ケースの採用","職人一人での一貫製造"],k:0,
 e:"19世紀のアメリカで、規格化された部品による大量生産が進みました。これにより時計の価格が下がり、多くの人が時計を持てるようになりました。"},
{c:"hist",l:1,q:"かつて時計の精度が特に重視された、代表的な職業はどれでしょう？",
 a:["鉄道員","画家","漁師","農家"],k:0,
 e:"鉄道の運行では、正確な時刻管理が安全に直結しました。そのため各社は厳しい基準を満たした「鉄道時計」を採用し、時計の精度向上を後押ししました。"},
{c:"hist",l:1,q:"時計の針や文字盤が「夜でも光る」ようになった背景にある物質は？",
 a:["夜光塗料","水銀","純金","琥珀"],k:0,
 e:"暗所で発光する夜光塗料の登場で、夜間でも時刻が読めるようになりました。かつては放射性物質が使われた時代もありましたが、現在は安全な蓄光塗料が主流です。"},
{c:"hist",l:1,q:"「スマートウォッチ」が広く普及するきっかけとなった、2015年発売の製品は？",
 a:["Apple Watch","G-SHOCK","スウォッチ","カシオ計算機の電卓時計"],k:0,
 e:"2015年に発売されたApple Watchは、スマートウォッチ市場を一気に拡大させました。健康管理や通知機能を備え、腕時計の役割を大きく広げた製品です。"},
{c:"hist",l:1,q:"腕時計以前に主流だった、鎖などで身につける携帯時計は何と呼ばれるでしょう？",
 a:["懐中時計","日時計","砂時計","水時計"],k:0,
 e:"懐中時計は、ポケットに入れて鎖でつなぐ携帯時計です。19世紀まで主流でしたが、20世紀に入り、より手軽な腕時計にその座を譲っていきました。"},
{c:"hist",l:1,q:"スイスが時計産業で世界的地位を築いた背景にある、伝統的な生産形態は？",
 a:["家内工業による分業","国営工場での一括生産","輸入品の再販売","軍による製造独占"],k:0,
 e:"スイスの時計づくりは、山間部の農家が冬の副業として部品を作る家内工業から発展しました。細かな分業と職人技の蓄積が、後の高い技術力の土台になりました。"},
{c:"hist",l:1,q:"日本の「セイコー」がその名を国際的に高めた、1964年の大きな舞台は？",
 a:["東京オリンピック","大阪万博","札幌オリンピック","日本万国博覧会"],k:0,
 e:"セイコーは、1964年の東京オリンピックで公式計時を担当しました。この経験が技術力を大きく引き上げ、後のクォーツ開発にもつながっていきました。"},
{c:"hist",l:2,q:"エベレスト初登頂(1953年)の遠征隊に時計を提供し、実用性を証明したブランドは？",
 a:["ロレックス","オメガ","セイコー","ハミルトン"],k:0,
 e:"1953年のエベレスト初登頂遠征隊にロレックスが時計を提供し、過酷な環境での実用性が証明されました。これがエクスプローラー誕生の背景となりました。"},
{c:"hist",l:2,q:"パネライが、もともと精密機器や時計を供給していた相手はどこでしょう？",
 a:["イタリア海軍","フランス空軍","スイス山岳部隊","英国海兵隊"],k:0,
 e:"フィレンツェのパネライは、イタリア海軍の特殊潜水部隊に夜光計器や時計を供給していました。視認性の高い大型ケースの「ルミノール」「ラジオミール」は、その系譜です。"},
{c:"hist",l:2,q:"アポロ11号の月面着陸で、船長ニール・アームストロングとともに歩いた飛行士は？",
 a:["バズ・オルドリン","マイケル・コリンズ","ジョン・グレン","アラン・シェパード"],k:0,
 e:"バズ・オルドリンは、アームストロングに続いて月面を歩いた飛行士です。彼が着用していたオメガ スピードマスターは、後に「ムーンウォッチ」の愛称で広く知られるようになります。"},
{c:"hist",l:2,q:"クォーツショック以前、時計の精度を競った国際的な催しは何と呼ばれたでしょう？",
 a:["天文台クロノメーターコンクール","ワールドウォッチカップ","スイス時計博覧会","精度オリンピック"],k:0,
 e:"かつて各社は、天文台が主催する精度コンクールで技術を競い合いました。ここでの成績はブランドの威信に直結し、ムーブメント開発を大きく前進させました。"},
{c:"hist",l:2,q:"セイコーの高級ラインで、1960年に「最高の普通」を掲げて誕生したのは？",
 a:["グランドセイコー","プロスペックス","クレドール","ドルチェ"],k:0,
 e:"グランドセイコーは、1960年に「世界に通用する最高級の実用時計」を目指して誕生しました。視認性や精度、仕上げの美しさを徹底的に追求したラインです。"},
{c:"hist",l:2,q:"1980年代にスイス時計産業を救った、樹脂製の安価な時計ブランドは？",
 a:["スウォッチ","カシオ","タイメックス","フォッシル"],k:0,
 e:"スウォッチは、部品を減らした樹脂製の安価な時計として1983年に登場しました。ファッション性の高さで大ヒットし、危機に瀕したスイス時計産業を立て直す原動力になりました。"},
{c:"hist",l:2,q:"高級時計ブランドが公式に中古（認定中古）市場へ乗り出す、主な狙いはどれでしょう？",
 a:["真贋保証やブランド価値の維持","製造コストの削減","新作販売数の抑制","電池交換需要の拡大"],k:0,
 e:"認定中古プログラムは、ブランド自らが真贋を保証し、資産価値を管理する狙いで広がっています。ロレックスなどが公式に取り組みを始めています。"},
{c:"hist",l:2,q:"ジェームズ・ボンドが映画で長く愛用してきた、二つのブランドの組み合わせは？",
 a:["ロレックスとオメガ","カルティエとブルガリ","IWCとパネライ","セイコーとシチズン"],k:0,
 e:"初期のボンド映画ではロレックスが、1995年以降はオメガ シーマスターが主に着用されてきました。映画とのタイアップは、ブランドの知名度を大きく高めています。"},
{c:"hist",l:2,q:"日本のセイコーが1988年に実用化した、自らの動きで発電する機構の名は？",
 a:["キネティック","スプリングドライブ","エコ・ドライブ","オートクォーツ"],k:0,
 e:"キネティックは、腕の動きで発電しクォーツを駆動する仕組みです。電池交換を減らせる環境配慮型の技術として、セイコーが実用化しました。"},
{c:"hist",l:2,q:"1957年に登場したハミルトンの「ベンチュラ」が、時計史で画期的だった点は？",
 a:["世界初の電池式（電気時計）","世界初の自動巻き","世界初の防水","世界初の夜光"],k:0,
 e:"ハミルトンのベンチュラは、電池を動力とする世界初の電気時計として登場しました。左右非対称の斬新なデザインでも知られ、映画などにも多く登場しています。"},
{c:"hist",l:3,q:"1980年代、崩壊寸前だったスイス時計産業の再編を主導した人物は誰でしょう？",
 a:["ニコラス・G・ハイエック","ハンス・ウィルスドルフ","ジャン＝クロード・ビバー","フィリップ・シュテルン"],k:0,
 e:"ニコラス・G・ハイエックは、経営難の2大企業グループの合併を主導しました。樹脂製の安価な「スウォッチ」の大ヒットによって、スイス時計産業を蘇らせた立役者です。"},
{c:"hist",l:3,q:"時計の精度を検定する機関COSCが置かれている国はどこでしょう？",
 a:["スイス","フランス","ドイツ","イギリス"],k:0,
 e:"COSC（スイス公認クロノメーター検定協会）は、スイス国内で製造されたムーブメントの精度を検定する非営利団体です。認定に合格したものだけが「クロノメーター」を名乗れます。"},
{c:"hist",l:3,q:"世界初のクォーツ腕時計「アストロン」が発売された当時の価格帯は、およそどれでしょう？",

{c:"appraisal",l:1,q:"買取査定で、本体に加え箱・保証書・タグなどが揃った状態を指す言葉は？",

{c:"appraisal",l:3,q:"真贋鑑定で「リダン（文字盤の書き直し)」が問題視されるのは、なぜでしょう？",

{c:"appraisal",l:3,q:"ヴィンテージ時計で「アーカイブ（製造証明書）の取り寄せ」が行われる目的は？",

{c:"appraisal",l:3,q:"オークションで時計として史上最高額級の落札となり話題を呼んだ、俳優ポール・ニューマンゆかりの時計は？",
 a:["ロレックス デイトナ","オメガ スピードマスター","カルティエ タンク","パテック フィリップ カラトラバ"],k:0,
 e:"ポール・ニューマンが愛用したロレックス デイトナは、2017年のオークションで約1,780万ドルという時計史に残る高額で落札され、「ポール・ニューマン・ダイヤル」人気を決定づけました。"},

 e:"ダブルネームは、ティファニーなど有名販売店の名が正規に文字盤へ併記された個体です。正規の共同刻印は数が少なく、来歴の面白さもあって高く評価されます。"},
{c:"appraisal",l:3,q:"人気モデルで「定価より中古が高い」状態が続く一因として、最も近いのは？",

 e:"2020年代前半、投機資金の流入で一部人気モデルの相場が急騰し、その後の調整で急落するなど、値動きの振れ幅が大きくなったことが指摘されています。"},
{c:"appraisal",l:3,q:"「箱・保証書なし」の時計が、揃っている個体より評価が下がりやすいのは、なぜ？",
 a:["真贋確認や再販の手間が増えるから","動かないから","古いから","重いから"],k:0,
 e:"付属品が欠けると、真贋の確認や再販の手間が増え、買い手も付きにくくなるため、フルセットに比べて査定額が下がりやすくなります。"}

const CATS = [
  {id:"brand", name:"ブランドの基礎", desc:"創業者・本拠地・ブランドの系譜"},
  {id:"model", name:"代表モデル", desc:"サブマリーナーからロイヤル オークまで"},
  {id:"tech",  name:"機構と専門用語", desc:"脱進機、トゥールビヨン、振動数の話"},
  {id:"hist",  name:"歴史とトリビア", desc:"クォーツショックと腕時計の物語"},
  {id:"appraisal", name:"査定・買取の知識", desc:"フルセット、状態評価、相場の話"}
];
const CATNAME = Object.fromEntries(CATS.map(c=>[c.id,c.name]));
const LEVELS = [
  {id:1, crown:"I",   name:"初級",  desc:"時計の基本を楽しく確認"},
  {id:2, crown:"II",  name:"中級",  desc:"少し踏み込んだ愛好家向け"},
  {id:3, crown:"III", name:"上級",  desc:"数値や機構名まで問う専門編"},
  {id:0, crown:"—",   name:"おまかせ（全レベル）", desc:"初級〜上級をランダムに出題"}
];
let pool=[], idx=0, score=0, streak=0, best=0, lastCat=null, lastLevel=null;
const $ = id => document.getElementById(id);
const show = id => {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
};
const shuffle = arr => {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
};
const LVLNAME = {1:"初級",2:"中級",3:"上級"};
function buildStart(){
  const grid=$('catGrid'); grid.innerHTML='';
  CATS.forEach(c=>{
    const n=QUESTIONS.filter(q=>q.c===c.id).length;
    const b=document.createElement('button');
    b.className='cat';
    b.innerHTML=`<div class="cname">${c.name}</div><div class="cdesc">${c.desc}</div><div class="ccount">全 ${n} 問</div>`;
    b.onclick=()=>openDifficulty(c.id);
    grid.appendChild(b);
  });
  const mix=document.createElement('button');
  mix.className='cat mix';
  mix.innerHTML=`<div class="cname">総合ミックス</div><div class="cdesc">全カテゴリーからランダムに出題</div>`;
  mix.onclick=()=>openDifficulty('mix');
  grid.appendChild(mix);
}
function openDifficulty(catId){
  lastCat=catId;
  const base = catId==='mix' ? QUESTIONS : QUESTIONS.filter(q=>q.c===catId);
  $('diffLead').textContent = catId==='mix'
    ? '難易度を選んでください（総合ミックス）。'
    : `難易度を選んでください（${CATNAME[catId]}）。`;
  const grid=$('diffGrid'); grid.innerHTML='';
  LEVELS.forEach(lv=>{
    const n = lv.id===0 ? base.length : base.filter(q=>q.l===lv.id).length;
    if(n===0) return;
    const b=document.createElement('button');
    b.className='diff';
    b.innerHTML=`<span class="dcrown">${lv.crown}</span>
      <span style="flex:1"><span class="dname">${lv.name}</span><div class="ddesc">${lv.desc}</div></span>
      <span class="dcount">全 ${n} 問</span>`;
    b.onclick=()=>start(catId, lv.id);
    grid.appendChild(b);
  });
  show('scr-diff');
}
$('backToCat').onclick=()=>show('scr-start');
function start(catId, level){
  lastCat=catId; lastLevel=level;
  let base = catId==='mix' ? QUESTIONS : QUESTIONS.filter(q=>q.c===catId);
  if(level!==0) base = base.filter(q=>q.l===level);
  const count = catId==='mix' ? Math.min(20, base.length) : base.length;
  pool = shuffle(base).slice(0, count);
  idx=0; score=0; streak=0; best=0;
  show('scr-quiz');
  render();
}
function render(){
  const q=pool[idx];
  $('qNum').textContent=`${idx+1} / ${pool.length}`;
  $('reserveFill').style.width=`${(idx/pool.length)*100}%`;
  $('streak').textContent=streak;
  $('qCat').textContent=CATNAME[q.c];
  $('qLvl').textContent=`・${LVLNAME[q.l]}`;
  $('qText').textContent=q.q;
  $('explain').classList.remove('show');
  const order=shuffle(q.a.map((t,i)=>({t,i})));
  const opts=$('opts'); opts.innerHTML='';
  order.forEach((o,pos)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="key">${'ABCD'[pos]}</span><span>${o.t}</span>`;
    b.onclick=()=>answer(b,o.i===q.k,q);
    opts.appendChild(b);
  });
}
function answer(btn, ok, q){
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    const text=b.querySelectorAll('span')[1].textContent;
    if(text===q.a[q.k]) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  if(ok){score++;streak++;best=Math.max(best,streak);}else{streak=0;}
  $('streak').textContent=streak;
  $('verdict').textContent = ok ? '正解' : '不正解';
  $('verdict').className = 'verdict ' + (ok?'ok':'ng');
  $('eText').textContent = q.e;
  $('nextBtn').textContent = idx===pool.length-1 ? '結果を見る' : '次の問題へ';
  $('explain').classList.add('show');
  $('reserveFill').style.width=`${((idx+1)/pool.length)*100}%`;
  $('nextBtn').focus();
}
$('nextBtn').onclick=()=>{
  if(idx<pool.length-1){idx++;render();}
  else finish();
};
function finish(){
  show('scr-result');
  const pct=Math.round(score/pool.length*100);
  const rank =
    pct===100 ? {t:"マスター・ウォッチメーカー", s:"完璧です。時計店で店員より詳しく語れるレベル。次は上級や別カテゴリーで腕試しを。"} :
    pct>=80  ? {t:"コレクター級", s:"かなりの知識量です。取りこぼした問題の解説を読めば、マスターは目前です。"} :
    pct>=60  ? {t:"愛好家", s:"基礎はしっかり身についています。中級・上級にも挑戦してみてください。"} :
    pct>=40  ? {t:"見習い", s:"良いスタートです。解説を読みながら繰り返すと、知識が一気に定着します。"} :
               {t:"入門者", s:"ここからが本番です。まずは初級から順に挑戦してみてください。"};
  $('rankTitle').textContent=rank.t;
  $('rankSub').textContent=rank.s;
  $('rScore').textContent=`${score} / ${pool.length}`;
  $('rBest').textContent=best;
  $('gaugePct').textContent=`${pct}%`;
  const arc=$('gaugeArc');
  arc.style.strokeDashoffset=553;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    arc.style.strokeDashoffset=553*(1-pct/100);
  }));
}
$('retryBtn').onclick=()=>start(lastCat, lastLevel);
$('homeBtn').onclick=()=>show('scr-start');
buildStart();
</script>
