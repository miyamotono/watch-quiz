<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ウォッチ・アカデミー — 腕時計の教養クイズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --dial:#101725;
    --dial-2:#17202F;
    --card:#1B2536;
    --line:#2B3648;
    --gold:#C8A96E;
    --gold-soft:#A98F5E;
    --silver:#E9E7E1;
    --muted:#8B95A5;
    --correct:#7FB08A;
    --wrong:#C07A7A;
    --serif:'Shippori Mincho', serif;
    --sans:'Zen Kaku Gothic New', sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 50% -10%, #1B2740 0%, var(--dial) 55%);
    color:var(--silver);
    font-family:var(--sans);
    line-height:1.7;
    display:flex;
    justify-content:center;
    padding:32px 16px 64px;
  }
  .app{width:100%;max-width:680px}

  .brand{text-align:center;margin-bottom:28px}
  .brand .eyebrow{font-size:11px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
  .brand h1{font-family:var(--serif);font-weight:600;font-size:clamp(26px,5vw,36px);letter-spacing:.08em}
  .brand .sub{color:var(--muted);font-size:13px;margin-top:8px;letter-spacing:.08em}
  .rule{width:120px;height:1px;margin:18px auto 0;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

  .screen{display:none;animation:fade .45s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .lead{color:var(--muted);font-size:14px;text-align:center;margin-bottom:26px}
  .backlink{display:inline-block;color:var(--muted);font-size:12px;letter-spacing:.1em;margin-bottom:18px;cursor:pointer;background:none;border:none;font-family:var(--sans)}
  .backlink:hover{color:var(--gold)}

  .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.cat-grid{grid-template-columns:1fr}}
  .cat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px 18px;cursor:pointer;text-align:left;color:var(--silver);font-family:var(--sans);transition:border-color .2s, transform .15s}
  .cat:hover{border-color:var(--gold-soft);transform:translateY(-2px)}
  .cat:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .cat .cname{font-family:var(--serif);font-size:17px;letter-spacing:.06em;color:var(--gold)}
  .cat .cdesc{font-size:12.5px;color:var(--muted);margin-top:6px}
  .cat .ccount{font-size:11px;color:var(--muted);margin-top:10px;letter-spacing:.15em}
  .cat.mix{grid-column:1/-1;text-align:center;background:linear-gradient(180deg,#20304A,#1B2536)}
  .cat.mix .cname{font-size:18px}

  .diff-grid{display:grid;gap:12px}
  .diff{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 20px;cursor:pointer;text-align:left;color:var(--silver);font-family:var(--sans);display:flex;align-items:center;gap:16px;transition:border-color .2s, transform .15s}
  .diff:hover{border-color:var(--gold-soft);transform:translateY(-2px)}
  .diff:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .diff .dcrown{font-family:var(--serif);font-size:22px;color:var(--gold);width:34px;flex-shrink:0;text-align:center}
  .diff .dname{font-family:var(--serif);font-size:16px;letter-spacing:.06em}
  .diff .ddesc{font-size:12.5px;color:var(--muted);margin-top:3px}
  .diff .dcount{font-size:11px;color:var(--muted);margin-left:auto;letter-spacing:.1em;white-space:nowrap}

  .hud{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:16px}
  .hud .label{font-size:11px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase}
  .hud .val{font-family:var(--serif);font-size:18px;color:var(--gold)}
  .reserve{flex:1;height:6px;border-radius:3px;background:var(--card);border:1px solid var(--line);overflow:hidden;position:relative}
  .reserve .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-soft),var(--gold));transition:width .5s ease}
  .qcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:28px 26px}
  .qcat{font-size:11px;letter-spacing:.3em;color:var(--gold);margin-bottom:12px;display:flex;gap:10px;align-items:center}
  .qcat .lvl{color:var(--muted);letter-spacing:.15em}
  .qtext{font-family:var(--serif);font-size:clamp(17px,3.4vw,20px);font-weight:600;letter-spacing:.03em;margin-bottom:22px}
  .opts{display:grid;gap:10px}
  .opt{background:var(--dial-2);border:1px solid var(--line);border-radius:8px;padding:14px 16px;text-align:left;color:var(--silver);font-family:var(--sans);font-size:15px;cursor:pointer;transition:border-color .15s, background .15s;display:flex;align-items:center;gap:12px}
  .opt .key{font-family:var(--serif);color:var(--muted);font-size:13px;width:20px;flex-shrink:0}
  .opt:hover:not(:disabled){border-color:var(--gold-soft)}
  .opt:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .opt:disabled{cursor:default}
  .opt.correct{border-color:var(--correct);background:rgba(127,176,138,.12)}
  .opt.correct .key{color:var(--correct)}
  .opt.wrong{border-color:var(--wrong);background:rgba(192,122,122,.12)}
  .opt.dim{opacity:.45}

  .explain{display:none;margin-top:20px;border-top:1px solid var(--line);padding-top:16px}
  .explain.show{display:block;animation:fade .35s ease}
  .verdict{font-family:var(--serif);font-size:15px;letter-spacing:.1em;margin-bottom:6px}
  .verdict.ok{color:var(--correct)}
  .verdict.ng{color:var(--wrong)}
  .etext{font-size:13.5px;color:var(--muted)}
  .nextrow{margin-top:18px;text-align:right}
  .btn{background:transparent;border:1px solid var(--gold-soft);color:var(--gold);font-family:var(--sans);font-size:14px;letter-spacing:.15em;padding:11px 26px;border-radius:6px;cursor:pointer;transition:background .15s}
  .btn:hover{background:rgba(200,169,110,.1)}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .btn.solid{background:var(--gold);color:#1A1408;border-color:var(--gold);font-weight:700}
  .btn.solid:hover{background:#D6B87C}

  .result{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:36px 26px}
  .gauge{width:190px;height:190px;margin:0 auto 18px;display:block}
  .rtitle{font-family:var(--serif);font-size:24px;color:var(--gold);letter-spacing:.08em;margin-bottom:6px}
  .rsub{color:var(--muted);font-size:13.5px;max-width:420px;margin:0 auto 22px}
  .rstats{display:flex;justify-content:center;gap:36px;margin-bottom:26px;flex-wrap:wrap}
  .rstats .stat .n{font-family:var(--serif);font-size:26px;color:var(--silver)}
  .rstats .stat .l{font-size:11px;letter-spacing:.25em;color:var(--muted)}
  .btnrow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <header class="brand">
    <div class="eyebrow">Horology Academy</div>
    <h1>ウォッチ・アカデミー</h1>
    <div class="sub">腕時計のブランド・機構・査定を学ぶ、大人の教養クイズ</div>
    <div class="rule"></div>
  </header>

  <section class="screen active" id="scr-start">
    <p class="lead">カテゴリーを選んでください。次の画面で難易度も選べます。</p>
    <div class="cat-grid" id="catGrid"></div>
  </section>

  <section class="screen" id="scr-diff">
    <button class="backlink" id="backToCat">← カテゴリー選択に戻る</button>
    <p class="lead" id="diffLead"></p>
    <div class="diff-grid" id="diffGrid"></div>
  </section>

  <section class="screen" id="scr-quiz">
    <div class="hud">
      <div>
        <div class="label">Question</div>
        <div class="val" id="qNum">1 / 9</div>
      </div>
      <div class="reserve" aria-hidden="true"><div class="fill" id="reserveFill"></div></div>
      <div style="text-align:right">
        <div class="label">Streak</div>
        <div class="val" id="streak">0</div>
      </div>
    </div>
    <div class="qcard">
      <div class="qcat"><span id="qCat"></span><span class="lvl" id="qLvl"></span></div>
      <div class="qtext" id="qText"></div>
      <div class="opts" id="opts"></div>
      <div class="explain" id="explain">
        <div class="verdict" id="verdict"></div>
        <div class="etext" id="eText"></div>
        <div class="nextrow"><button class="btn solid" id="nextBtn">次の問題へ</button></div>
      </div>
    </div>
  </section>

  <section class="screen" id="scr-result">
    <div class="result">
      <svg class="gauge" viewBox="0 0 200 200" id="gaugeSvg" role="img" aria-label="スコアゲージ">
        <circle cx="100" cy="100" r="88" fill="none" stroke="#2B3648" stroke-width="6"/>
        <circle id="gaugeArc" cx="100" cy="100" r="88" fill="none" stroke="#C8A96E" stroke-width="6"
                stroke-linecap="round" stroke-dasharray="553" stroke-dashoffset="553"
                transform="rotate(-90 100 100)" style="transition:stroke-dashoffset 1s ease"/>
        <text id="gaugePct" x="100" y="96" text-anchor="middle" fill="#E9E7E1"
              font-family="Shippori Mincho, serif" font-size="34">0%</text>
        <text x="100" y="122" text-anchor="middle" fill="#8B95A5"
              font-family="Zen Kaku Gothic New, sans-serif" font-size="10" letter-spacing="3">ACCURACY</text>
      </svg>
      <div class="rtitle" id="rankTitle"></div>
      <p class="rsub" id="rankSub"></p>
      <div class="rstats">
        <div class="stat"><div class="n" id="rScore">0</div><div class="l">正解数</div></div>
        <div class="stat"><div class="n" id="rBest">0</div><div class="l">最大連続正解</div></div>
      </div>
      <div class="btnrow">
        <button class="btn solid" id="retryBtn">同じ条件でもう一度</button>
        <button class="btn" id="homeBtn">カテゴリー選択へ</button>
      </div>
    </div>
  </section>
</div>

<script>
// level: 1=初級 2=中級 3=上級
const QUESTIONS = [
// ============ brand (6) ============
{c:"brand",l:1,q:"1905年にロンドンでロレックスを創業した人物は？",
 a:["ハンス・ウィルスドルフ","ルイ・カルティエ","ニコラス・G・ハイエック","フロレンティン・アリオスト・ジョーンズ"],k:0,
 e:"ドイツ出身のハンス・ウィルスドルフがロンドンで創業し、後に本拠をスイス・ジュネーブへ移しました。「Rolex」はどの言語でも発音しやすいように考案された造語とされています。"},
{c:"brand",l:1,q:"いわゆる「世界三大高級時計（雲上ブランド）」に一般に含まれないのは？",
 a:["ロレックス","パテック フィリップ","オーデマ ピゲ","ヴァシュロン・コンスタンタン"],k:0,
 e:"三大ブランドはパテック フィリップ、オーデマ ピゲ、ヴァシュロン・コンスタンタン。ロレックスは知名度・人気で群を抜きますが、伝統的な格付けではこの3社が「雲上」とされます。"},
{c:"brand",l:2,q:"ドイツの時計の聖地グラスヒュッテを本拠とする高級ブランドは？",
 a:["A. ランゲ＆ゾーネ","IWC","ジャガー・ルクルト","オーデマ ピゲ"],k:0,
 e:"A. ランゲ＆ゾーネは1845年創業。東西ドイツ統一後の1990年に復興し、ドイツ時計の最高峰と評されます。同じグラスヒュッテにはグラスヒュッテ・オリジナルやノモスもあります。"},
{c:"brand",l:1,q:"セイコーが1969年に発売した、世界初の市販クォーツ腕時計は？",
 a:["アストロン","ローレル","キングセイコー","マーベル"],k:0,
 e:"クオーツアストロンは1969年12月に東京で発売。従来の機械式より桁違いに高精度で、世界の時計産業の構造を変える「クォーツショック」の引き金となりました。"},
{c:"brand",l:2,q:"ロイヤル オークやノーチラスを手がけ「時計界のピカソ」とも称されたデザイナーは？",
 a:["ジェラルド・ジェンタ","ジョージ・ダニエルズ","フランク・ミュラー","アブラアン＝ルイ・ブレゲ"],k:0,
 e:"ジェラルド・ジェンタはラグジュアリースポーツウォッチというジャンルを確立した伝説的デザイナー。ブルガリの「オクト」の源流やIWC「インヂュニア」も彼の仕事です。"},
{c:"brand",l:3,q:"独立時計師として知られ、同軸脱進機を発明しオメガに技術供与したイギリス人は？",
 a:["ジョージ・ダニエルズ","ジェラルド・ジェンタ","フィリップ・デュフォー","フランソワ＝ポール・ジュルヌ"],k:0,
 e:"ジョージ・ダニエルズは20世紀最高峰の独立時計師の一人。摩擦を減らす同軸脱進機を1970年代に考案し、1999年からオメガが実用化しました。"},

// ============ model (6) ============
{c:"model",l:1,q:"1953年に登場したロレックスの代表的ダイバーズウォッチは？",
 a:["サブマリーナー","シードゥエラー","エワンプローラー","デイトナ"],k:0,
 e:"サブマリーナーは回転ベゼルと高い防水性を備えた近代ダイバーズウォッチの原型。シードゥエラーはより深い飽和潜水向けの後発モデルです。"},
{c:"model",l:1,q:"アポロ計画で宇宙飛行士とともに月面に到達した「ムーンウォッチ」は？",
 a:["オメガ スピードマスター","ロレックス GMTマスター","ブライトリング ナビタイマー","セイコー スピードタイマー"],k:0,
 e:"スピードマスターはNASAの過酷な公式テストに合格し、1969年のアポロ11号で月面へ。手巻きクロノグラフという構成は現行のムーンウォッチにも受け継がれています。"},
{c:"model",l:2,q:"パテック フィリップが1976年に発表した、舷窓に着想を得たスポーツウォッチは？",
 a:["ノーチラス","アクアノート","カラトラバ","ゴンドーロ"],k:0,
 e:"ノーチラスはジェラルド・ジェンタのデザイン。丸みを帯びた八角形ベゼルが特徴で、現在は入手困難な人気モデルの代名詞になっています。アクアノートは1997年登場の弟分です。"},
{c:"model",l:2,q:"1972年、オーデマ ピゲが発表した「高級ブランロススポーツウォッチ」の先駆けは？",
 a:["ロイヤル オーク","ミレネリー","コード11.59","ジュール・オーデマ"],k:0,
 e:"ロイヤル オークは八角形ベゼルと8本のビス、ペストリー模様の文字盤が特徴。当時、金無垢時計より高価なステンレス時計という発想は革命的でした。"},
{c:"model",l:1,q:"ロレックス GMTマスターは、もともとどの業界のために開発された？",
 a:["航空業界","潜水業界","登山・探検","自動車レース"],k:0,
 e:"1955年、大陸間路線を飛ぶパンアメリカン航空のパイロット向けに開発されました。赤青ベゼル（通称ペプシ）は昼夜を区別するたものもです。"},
{c:"model",l:3,q:"1945年発表、ロレックス初の永久カレンダー機構を搭載した最高峰のドレスウォッチ「デイデイト」の通称の由来は？",
 a:["曜日と日付を同時に表示することから","毎日調整が必要だったことから","2つの日付窓を持つことから","開発責任者の名前から"],k:0,
 e:"デイデイトは文字盤上部の窓に曜日（Day）、3時位置に日付（Date）を表示する初のモデルで、通称の由来もそのままです。大統領ブレスレットとの組み合わせで「プレジデント」の愛称もあります。"},

// ============ tech (6) ============
{c:"tech",l:1,q:"ストップウォッチ機能を備えた時計を指す言葉は？",
 a:["クロノグラフ","クロノメーター","タキメーター","レギュレーター"],k:0,
 e:"クロノグラフ＝ストップウォッチ機能、クロノメーター＝精度検定に合格した時計。似ていますが全くの別物で、時計好きが最初に覚える区別です。"},
{c:"tech",l:1,q:"自動巻き時計で、腕の動きを利用してゼンマイを巻き上げる半円形の部品は？",
 a:["ローター（回転錘）","テンプ","香箱","アンクル"],k:0,
 e:"ローターの回転がゼンマイを巻き上げます。透明な裏蓋（シースルーバック）から見える大きな半円形の部品がそれです。"},
{c:"tech",l:2,q:"重力による姿勢差の誤差を相殺するため、脱進機ごと回転させる複雑機構は？",
 a:["トゥールビヨン","ミニッツリピーター","レトログラード","デッドビートセコンド"],k:0,
 e:"トゥールビヨンは1801年にアブラアン＝ルイ・ブレゲが特許を取得。懐中時計時代の発明ですが、現在は高度な技術力の象徴として珍重されます。"},
{c:"tech",l:2,q:"うるう年を含む月末の日付調整を自動で行うカレンダー機構は？",
 a:["パーペチュアルカレンダー","アニュアルカレンダー","トリプルカレンダー","ビッグデイト"],k:0,
 e:"パーペチュアルカレンダー（永久カレンダー）は理論上2100年まで修正不要。アニュアルカレンダーは2月末のみ年1回の修正が必要な簡易版です。"},
{c:"tech",l:3,q:"毎時28,800振動（1時間に28,800回）のテンプは、1秒間に何回振動する？",
 a:["4回","2回","6回","8回"],k:0,
 e:"28,800振動を3,600秒（1時間）で割ると8。往復1回＝2振動なので、周波数は8÷2＝4Hzとなります。多くの現代機械式ムーブメントがこの毎時28,800振動＝4Hzを採用しています。"},
{c:"tech",l:2,q:"機械式時計が磁気を帯びると起こりやすい不具合は？",
 a:["ヒゲゼンマイが張り付き大きく進むことがある","電池の消耗が早まる","防水パッキンが劣化する","針が逆回転する"],k:0,
 e:"ヒゲゼンマイが磁化すると渦巻きの間隔が縮まって短絡し、テンプの振動が速くなって時計が大きく進むことがあります。対策として非磁性のシリコンヒゲゼンマイなどが使われます。"},

// ============ hist (6) ============
{c:"hist",l:1,q:"1970年代、安価で高精度なクォーツの台頭がスイス機械式時計産業を危機に陥れた出来事は？",
 a:["クォーツショック","オイルショック","ウォッチバブル","ジュネーブ危機"],k:0,
 e:"クォーツショック（クォーツ危機）でスイスの時計関連雇用は激減。1983年のスウォッチの成功と機械式の高級路線への転換で産業は復活しました。"},
{c:"hist",l:2,q:"次のうち、スウォッチ グループの傘下ではないブランドは？",
 a:["ロレックス","オメガ","ロンジン","ブレゲ"],k:0,
 e:"ロレックスは財団が所有する独立企業です。スウォッチ グループはオメガ、ブレゲ、ロンジン、ティソなど多数を擁するスイス最大の時計グループです。"},
{c:"hist",l:1,q:"腕時計が男性にも本格的に普及する大きなきっかけとなった出来事は？",
 a:["第一次世界大戦","産業革命","万国博覧会","大陸横断鉄道の開通"],k:0,
 e:"塹壕戦では懐中時計を取り出す余裕がなく、腕に着ける時計の実用性が証明されました。それまで腕時計は主に女性の装身具と見なされていました。"},
{c:"hist",l:1,q:"1926年に発表された、世界初の防水腕時計として知られるロレックスのケースの名称は？",
 a:["オイスー","パーペチュアル","サイクロップス","トリプロック"],k:0,
 e:"「牡蠣のように密閉された」ケースという意味のオイスター。翌年、英仏海峡を泳いで渡った女性スイマーが着用し、その防水性が広く知られました。"},
{c:"hist",l:2,q:"1953年のエベレスト初登頂の遠征と関連づけて発表されたロレックスのモデルは？",
 a:["エクスプローラー","エアキング","ミルガウス","オイスーデイト"],k:0,
 e:"ヒラリーとテンジンによる初登頂を成し遂げた遠征隊にロレックスが時計を提供したことにちなみ、同年「エクスプローラー」が誕生しました。"},
{c:"hist",l:3,q:"1980年代、崩壊寸前だったスイス時計産業の再編を主導し、スウォッチ グループの礎を築いた人物は？",
 a:["ニコラス・G・ハイエック","ハンス・ウィルスドルフ","ジャン＝クロード・ビバー","フィリップ・シュトルン"],k:0,
 e:"ニコラス・G・ハイエックはASUAGとSSIHという経営難の2大企業グループの合併を主導し、樹脂製の安価な「スウォッチ」の大ヒットでスイス時計産業を蘇らせました。"},

// ============ appraisal 査定・買取 (6) ============
{c:"appraisal",l:1,q:"買取査定で重視される、時計本体に加えて元箱・保証書・タグなど付属品一式が揃っている状態を指す言葉は？",
 a:["フルセット","メーカー保証","オーバーホール証明書","純正ベルト"],k:0,
 e:"「フルセット」とは本体に加え内箱・外箱、保証書、タグなど付属品が揃っている状態のこと。付属品の有無は査定額に大きく影響する代表的なチェックポイントです。"},
{c:"appraisal",l:1,q:"時計の真贋・状態確認のために査定士が必ず照合する、ケースやムーブメントに刻まれた個体識別番号は？",
 a:["シリアルナンバー","バーコード","モデルナンバー","ロットナンバー"],k:0,
 e:"シリアルナンバーは個体ごとに異なる番号で、製造年の推定や真贋確認、盗難データベースとの照合などに使われる重要な手がかりです。"},
{c:"appraisal",l:1,q:"中古時計店の状態評価で、傷や使用感がほとんど見られない「新品同様」の美品によく使われる記号は？",
 a:["N","J","C","D"],k:0,
 e:"中古市場ではS（新品・未使用）、N（新品同様）、A（美品）というように状態をランク分けするのが一般的で、傷の少なさや付属品の有無が総合的に判断されます。"},
{c:"appraisal",l:2,q:"時計の買取査定額を一般に下げる要因として最も当てはまるのは？",
 a:["社外品（非純正）のベルトに交換されている","定期的なオーバーホール記録がある","付属品（箱・保証書）が揃っている","人気の生産終了モデルである"],k:0,
 e:"純正以外のパーツへの交換は「オリジナル性」を損なうと判断され、査定額が下がる要因になりがちです。逆にメンテナンス記録や付属品の充実、人気の生産終了モデルであることはプラス評価につながります。"},
{c:"appraisal",l:2,q:"時計のケースやブレスレットに研磨（ポリッシュ）を施すことが、コレクター評価や査定額に与えやすい影響は？",
 a:["オリジナルの状態が失われ減額要因になりうる","必ず増額される","査定にはまったく無関係","保証期間が自動的に延びる"],k:0,
 e:"研磨によりケースの角の形状（エッジ）が変わり「オリジナル状態」ではなくなるため、コレクター評価や査定額でマイナスに働くことがあります。"},
{c:"appraisal",l:2,q:"正規販売店を通さない並行輸入や個人間転売などで形成される流通市場を指す言葉は？",
 a:["グレーマーケット","ブラックマーケット","プライマリーマーケット","アフターマーケット"],k:0,
 e:"グレーマーケットは正規代理店を経由しない並行輸入品や個人間転売などで形成される流通市場を指す言葉で、偽造品を扱う違法な「ブラックマーケット」とは区別されます。"}
];

const CATS = [
  {id:"brand", name:"ブランドの基礎", desc:"創業者・本拠地・ブランドの系譜"},
  {id:"model", name:"代表モデル", desc:"サブマリーナーからロイヤル オークまで"},
  {id:"tech",  name:"機構と専門用語", desc:"脱進機、トゥールビヨン、振動数の話"},
  {id:"hist",  name:"歴史とトリビア", desc:"クォーツショックと腕時計の物語"},
  {id:"appraisal", name:"査定・買取の知識", desc:"フルセット、状態評価、相場の話"}
];
const CATNAME = Object.fromEntries(CATS.map(c=>[c.id,c.name]));

const LEVELS = [
  {id:1, crown:"I",   name:"初級",  desc:"時計の基本を楽しく確認"},
  {id:2, crown:"II",  name:"中級",  desc:"少し踏み込んだ愛好家向け"},
  {id:3, crown:"III", name:"上級",  desc:"数値や機構名まで問う専門編"},
  {id:0, crown:"—",   name:"おまかせ（全レベル）", desc:"初級〜上級をランダムに出題"}
];

let pool=[], idx=0, score=0, streak=0, best=0, lastCat=null, lastLevel=null;

const $ = id => document.getElementById(id);
const show = id => {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
};
const shuffle = arr => {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
};
const LVLNAME = {1:"初級",2:"中級",3:"上級"};

function buildStart(){
  const grid=$('catGrid'); grid.innerHTML='';
  CATS.forEach(c=>{
    const n=QUESTIONS.filter(q=>q.c===c.id).length;
    const b=document.createElement('button');
    b.className='cat';
    b.innerHTML=`<div class="cname">${c.name}</div><div class="cdesc">${c.desc}</div><div class="ccount">全 ${n} 問</div>`;
    b.onclick=()=>openDifficulty(c.id);
    grid.appendChild(b);
  });
  const mix=document.createElement('button');
  mix.className='cat mix';
  mix.innerHTML=`<div class="cname">総合ミックス</div><div class="cdesc">全カテゴリーからランダムに出題</div>`;
  mix.onclick=()=>openDifficulty('mix');
  grid.appendChild(mix);
}

function openDifficulty(catId){
  lastCat=catId;
  const base = catId==='mix' ? QUESTIONS : QUESTIONS.filter(q=>q.c===catId);
  $('diffLead').textContent = catId==='mix'
    ? '難易度を選んでください（総合ミックス）。'
    : `難易度を選んでください（${CATNAME[catId]}）。`;
  const grid=$('diffGrid'); grid.innerHTML='';
  LEVELS.forEach(lv=>{
    const n = lv.id===0 ? base.length : base.filter(q=>q.l===lv.id).length;
    if(n===0) return;
    const b=document.createElement('button');
    b.className='diff';
    b.innerHTML=`<span class="dcrown">${lv.crown}</span>
      <span style="flex:1"><span class="dname">${lv.name}</span><div class="ddesc">${lv.desc}</div></span>
      <span class="dcount">全 ${n} 問</span>`;
    b.onclick=()=>start(catId, lv.id);
    grid.appendChild(b);
  });
  show('scr-diff');
}
$('backToCat').onclick=()=>show('scr-start');

function start(catId, level){
  lastCat=catId; lastLevel=level;
  let base = catId==='mix' ? QUESTIONS : QUESTIONS.filter(q=>q.c===catId);
  if(level!==0) base = base.filter(q=>q.l===level);
  const count = catId==='mix' ? Math.min(15, base.length) : base.length;
  pool = shuffle(base).slice(0, count);
  idx=0; score=0; streak=0; best=0;
  show('scr-quiz');
  render();
}

function render(){
  const q=pool[idx];
  $('qNum').textContent=`${idx+1} / ${pool.length}`;
  $('reserveFill').style.width=`${(idx/pool.length)*100}%`;
  $('streak').textContent=streak;
  $('qCat').textContent=CATNAME[q.c];
  $('qLvl').textContent=`・${LVLNAME[q.l]}`;
  $('qText').textContent=q.q;
  $('explain').classList.remove('show');

  const order=shuffle(q.a.map((t,i)=>({t,i})));
  const opts=$('opts'); opts.innerHTML='';
  order.forEach((o,pos)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="key">${'ABCD'[pos]}</span><span>${o.t}</span>`;
    b.onclick=()=>answer(b,o.i===q.k,q);
    opts.appendChild(b);
  });
}

function answer(btn, ok, q){
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    const text=b.querySelectorAll('span')[1].textContent;
    if(text===q.a[q.k]) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  if(ok){score++;streak++;best=Math.max(best,streak);}else{streak=0;}
  $('streak').textContent=streak;
  $('verdict').textContent = ok ? '正解' : '不正解';
  $('verdict').className = 'verdict ' + (ok?'ok':'ng');
  $('eText').textContent = q.e;
  $('nextBtn').textContent = idx===pool.length-1 ? '結果を見る' : '次の問題へ';
  $('explain').classList.add('show');
  $('reserveFill').style.width=`${((idx+1)/pool.length)*100}%`;
  $('nextBtn').focus();
}

$('nextBtn').onclick=()=>{
  if(idx<pool.length-1){idx++;render();}
  else finish();
};

function finish(){
  show('scr-result');
  const pct=Math.round(score/pool.length*100);
  const rank =
    pct===100 ? {t:"マスター・ウォッチメーカー", s:"完璧です。時計店で店員より詳しく語れるレベル。次は上級や別カテゴリーで腕試しを。"} :
    pct>=80  ? {t:"コレクター級", s:"かなりの知識量です。取りこぼした問題の解説を読めば、マスターは目前です。"} :
    pct>=60  ? {t:"愛好家", s:"基礎はしっかり身についています。中級・上級にも挑戦してみてください。"} :
    pct>=40  ? {t:"見習い", s:"良いスタートです。解説を読みながら繰り返すと、知識が丁気に定着します。"} :
               {t:"入門者", s:"ここからが本番です。まずは初級から順に挑戦してみてください。"};
  $('rankTitle').textContent=rank.t;
  $('rankSub').textContent=rank.s;
  $('rScore').textContent=`${score} / ${pool.length}`;
  $('rBest').textContent=best;
  $('gaugePct').textContent=`${pct}%`;
  const arc=$('gaugeArc');
  arc.style.strokeDashoffset=553;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    arc.style.strokeDashoffset=553*(1-pct/100);
  }));
}

$('retryBtn').onclick=()=>start(lastCat, lastLevel);
$('homeBtn').onclick=()=>show('scr-start');

buildStart();
</script>
</body>
</html>
